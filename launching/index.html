<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Northsyde Global · Launching Soon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            background: linear-gradient(-45deg, #0b0b1f, #1a1a3a, #23234d, #14142e);
            background-size: 400% 400%;
            animation: gradientShift 12s ease infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            perspective: 1200px;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* main card – will be dynamically tilted by JS */
        .launch-card {
            max-width: 800px;
            width: 100%;
            text-align: center;
            background: rgba(10, 10, 25, 0.65);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: 3rem;
            padding: 3.5rem 2rem;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), 0 0 0 2px rgba(170, 0, 255, 0.2) inset, 0 0 30px rgba(0, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: box-shadow 0.3s, transform 0.1s ease;
            transform-style: preserve-3d;
            transform: rotateX(0deg) rotateY(0deg) scale(1); 
            animation: floatIn 1.8s cubic-bezier(0.23, 1, 0.32, 1) forwards, softPulse 6s infinite alternate;
        }

        @keyframes floatIn {
            0% { opacity: 0; transform: translateY(60px) rotateX(8deg) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) rotateX(0) scale(1); }
        }

        @keyframes softPulse {
            0% { box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), 0 0 0 2px rgba(170, 0, 255, 0.2) inset, 0 0 30px rgba(0, 255, 255, 0.2); }
            100% { box-shadow: 0 40px 70px rgba(0, 0, 0, 0.8), 0 0 0 3px rgba(200, 0, 255, 0.4) inset, 0 0 50px rgba(0, 255, 255, 0.5); }
        }

        /* brand logo / name */
        .brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .brand-icon {
            font-size: 3.5rem;
            line-height: 1;
            filter: drop-shadow(0 0 10px cyan);
            animation: rotateIcon 8s infinite linear;
        }

        @keyframes rotateIcon {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .brand-name {
            font-size: clamp(2.5rem, 7vw, 4.5rem);
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #fff8, #e0b0ff, #a0f0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 15px #f0f, 0 0 35px #0ff;
            white-space: nowrap;
        }

        .launch-text {
            font-size: clamp(1.8rem, 5vw, 3rem);
            font-weight: 300;
            color: rgba(255, 255, 255, 0.9);
            text-transform: uppercase;
            letter-spacing: 6px;
            margin-bottom: 2rem;
            border-bottom: 2px solid rgba(255, 255, 255, 0.15);
            display: inline-block;
            padding-bottom: 0.5rem;
            backdrop-filter: blur(2px);
            animation: glitch 3s infinite alternate;
        }

        @keyframes glitch {
            0% { text-shadow: -2px 0 magenta, 2px 0 cyan; opacity: 0.9; }
            25% { text-shadow: 2px 0 magenta, -2px 0 cyan; }
            50% { text-shadow: -3px 0 cyan, 3px 0 magenta; }
            75% { text-shadow: 3px 0 cyan, -3px 0 magenta; }
            100% { text-shadow: -1px 0 magenta, 1px 0 cyan; opacity: 1; }
        }

        .tagline {
            font-size: 1.2rem;
            color: #ccc;
            max-width: 500px;
            margin: 1.8rem auto 0;
            font-weight: 300;
            letter-spacing: 2px;
            background: rgba(0,0,0,0.3);
            padding: 0.6rem 1.5rem;
            border-radius: 60px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.4s;
        }

        .tagline:hover {
            border-color: #ff66ff;
            background: rgba(20,20,40,0.7);
            letter-spacing: 4px;
        }

        .footer-note {
            margin-top: 3rem;
            font-size: 0.9rem;
            color: rgba(255,255,240,0.4);
            transition: color 0.3s;
        }

        .footer-note span {
            display: inline-block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 1; color: #ffb6ff; }
            100% { transform: scale(1); opacity: 0.5; }
        }

        .footer-note:hover {
            color: rgba(255,200,255,0.8);
        }

        /* decorative shapes (floating) */
        .shape {
            position: absolute;
            background: rgba(255, 0, 255, 0.15);
            filter: blur(60px);
            border-radius: 50%;
            z-index: -1;
        }

        .shape1 {
            width: 300px;
            height: 300px;
            top: 5%;
            left: 5%;
            background: #00ffff;
            animation: moveShape 18s infinite alternate;
        }

        .shape2 {
            width: 400px;
            height: 400px;
            bottom: 0;
            right: 0;
            background: #ff00ff;
            animation: moveShape 20s infinite alternate-reverse;
        }

        @keyframes moveShape {
            0% { transform: translate(0,0) scale(1); opacity: 0.2; }
            100% { transform: translate(100px, -50px) scale(1.3); opacity: 0.4; }
        }

        /* responsive */
        @media (max-width: 500px) {
            .launch-card {
                padding: 2rem 1.2rem;
                border-radius: 2rem;
            }
            .brand-name {
                white-space: normal;
            }
            .launch-text {
                letter-spacing: 3px;
            }
        }
    </style>
    <!-- load a nice font (optional) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- background floating shapes (css) -->
    <div class="shape shape1"></div>
    <div class="shape shape2"></div>

    <div class="launch-card" id="launchCard">
        <div class="brand">
            <span class="brand-icon">🌐</span>
            <span class="brand-name">NORTHSYDE GLOBAL</span>
        </div>
        <div class="launch-text">launching soon</div>
        <div class="tagline">the future is being built · be ready</div>
        <div class="footer-note">
            <span>✦</span>  elevate your experience  <span>✦</span>
        </div>
    </div>

    <script>
        (function() {
            // ===== TILT EFFECT (JavaScript driven animation) =====
            const card = document.getElementById('launchCard');
            // Limits for rotation (degrees)
            const maxRotateX = 8;
            const maxRotateY = 8;

            // Mouse move handler – smooth tilt based on cursor position inside card
            const handleMouseMove = (e) => {
                const rect = card.getBoundingClientRect();
                // Calculate mouse position relative to card center (between -1 and 1)
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                const mouseX = e.clientX - centerX;
                const mouseY = e.clientY - centerY;

                // Normalize to -1..1
                const normX = Math.max(-1, Math.min(1, mouseX / (rect.width / 2)));
                const normY = Math.max(-1, Math.min(1, mouseY / (rect.height / 2)));

                // Calculate rotation (invert direction for natural feel)
                const rotateY = normX * maxRotateY;     // positive mouse right -> positive Y rotation (turn right)
                const rotateX = -normY * maxRotateX;    // positive mouse down -> negative X rotation (tilt backward)

                // Apply smooth transition with requestAnimationFrame (no lag)
                card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.01)`;
            };

            // Reset tilt when mouse leaves
            const handleMouseLeave = () => {
                card.style.transform = 'rotateX(0deg) rotateY(0deg) scale(1)';
            };

            // Add event listeners if card exists
            if (card) {
                card.addEventListener('mousemove', handleMouseMove);
                card.addEventListener('mouseleave', handleMouseLeave);
            }

            // ===== ADDITIONAL JS ANIMATION: dynamic glow pulse based on time =====
            // (already in CSS, but we can also log a message to show JS activity)
            console.log('Northsyde Global launching soon — JS tilt ready');

            // optional: tiny micro-interaction: change footer emoji color each second? 
            // but we keep it simple, just to show JS is present.

            // You can also uncomment for a subtle secondary effect:
            /*
            setInterval(() => {
                const footer = document.querySelector('.footer-note span:first-child');
                if (footer) {
                    footer.style.color = `hsl(${Math.random() * 360}, 100%, 70%)`;
                }
            }, 800);
            */

        })();
    </script>
</body>
</html>
