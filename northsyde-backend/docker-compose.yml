services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: northsyde
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "5000:5000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/northsyde?schema=public
      JWT_SECRET: your_super_secret_key_change_this
      PORT: 5000
    volumes:
      - .:/app
      - /app/node_modules
      - ./uploads:/app/uploads
    command: sh -c "while ! nc -z db 5432; do echo 'Waiting for database...'; sleep 2; done; npx prisma migrate deploy && npm run seed && node src/server.js"

volumes:
  postgres_data: